version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      patch-updates:
        update-types:
          - "patch"
      minor-updates:
        update-types:
          - "minor"
    labels:
      - "dependencies"
      - "security"
    open-pull-requests-limit: 5
    # Ignore ALL major version upgrades — these require manual planning and testing
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
